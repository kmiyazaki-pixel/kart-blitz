<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kart Blitz</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#000;overflow:hidden;font-family:sans-serif; }
#wrap { position:relative;width:100vw;height:100vh; }
canvas#cv { display:block;width:100%;height:100%; }
/* HUD */
.hud-panel {
  position:absolute;background:rgba(0,0,0,0.62);border-radius:10px;
  color:#fff;border:1px solid rgba(255,204,68,0.35);
}
.hud-label { font-size:10px;color:#ffcc44;letter-spacing:2px;text-transform:uppercase; }
.hud-val   { font-size:22px;font-weight:700;line-height:1.1; }
#hud-left  { top:12px;left:12px;padding:8px 14px; }
#hud-center{ top:12px;left:50%;transform:translateX(-50%);padding:8px 18px;text-align:center; }
#hud-mm    { top:12px;right:12px;padding:6px; }
#hud-hint  { bottom:10px;left:50%;transform:translateX(-50%);padding:4px 14px;
             font-size:11px;color:#ddd;border-radius:16px; }
#msg {
  display:none;position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;font-weight:900;color:#fff;
  text-shadow:3px 3px 0 #000, 0 0 20px #ffaa00;
  text-align:center;line-height:1.3;pointer-events:none;
}
#course-name {
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  font-size:13px;font-weight:600;color:#ffcc44;letter-spacing:1px;
  pointer-events:none;margin-top:90px;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="hud-left" class="hud-panel">
    <div class="hud-label">LAP</div>
    <div id="lapd" class="hud-val">1 / 3</div>
    <div class="hud-label" style="margin-top:6px">POS</div>
    <div id="posd" class="hud-val" style="font-size:18px">1st</div>
  </div>
  <div id="hud-center" class="hud-panel">
    <div id="itemd" style="font-size:30px">--</div>
    <div id="spdd" style="font-size:12px;color:#ffcc44;font-weight:600">0 km/h</div>
  </div>
  <div id="hud-mm" class="hud-panel">
    <canvas id="mm" width="100" height="100"></canvas>
  </div>
  <div id="hud-hint" class="hud-panel">↑↓←→ / WASD: 操作 &nbsp;|&nbsp; Space: アイテム &nbsp;|&nbsp; <a href="index.html" style="color:#ffcc44">コース選択</a></div>
  <div id="msg"></div>
  <div id="course-name"></div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Engine modules -->
<script src="js/textures.js"></script>
<script src="js/kart.js"></script>
<script src="js/engine.js"></script>

<script>
// Determine which course to load from URL param
var params = new URLSearchParams(window.location.search);
var courseId = params.get('course') || 'practice';

// Dynamically load the course script, then start
var s = document.createElement('script');
s.src = 'courses/' + courseId + '.js';
s.onload = function() { startGame(Course); };
s.onerror = function() { document.body.innerHTML='<p style="color:#fff;padding:20px">コースが見つかりません: '+courseId+'</p>'; };
document.head.appendChild(s);

function startGame(C) {
  document.getElementById('course-name').textContent = C.name;
  document.title = C.name + ' — Kart Blitz';

  var W = window.innerWidth, H = window.innerHeight;
  var cv = document.getElementById('cv');
  cv.width = W; cv.height = H;

  var renderer = new THREE.WebGLRenderer({ canvas:cv, antialias:true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(C.skyColor || 0x55aaee);
  scene.fog = new THREE.Fog(C.fogColor || 0x88ccee, C.fogNear||100, C.fogFar||260);

  var camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 400);

  // Lights — nightMode uses dim ambient + no directional sun
  var isNight = C.nightMode || false;
  scene.add(new THREE.AmbientLight(isNight ? 0x112244 : 0xffeedd, isNight ? 0.4 : 0.7));
  if (!isNight) {
    var sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
    sun.position.set(50,100,50); sun.castShadow=true;
    sun.shadow.camera.left=-120; sun.shadow.camera.right=120;
    sun.shadow.camera.top=120; sun.shadow.camera.bottom=-120;
    sun.shadow.camera.far=350; sun.shadow.mapSize.set(1024,1024);
    scene.add(sun);
    scene.add(new THREE.DirectionalLight(0x88bbff, 0.3));
  }

  // Bake track
  var tpts = Engine.bakeTrack(C.controlPoints, C.trackSegs);

  // Ground — course can override with buildGround()
  if (C.buildGround) {
    C.buildGround(scene);
  } else {
    var gTex = C.groundTex ? Textures[C.groundTex]() : Textures.grass();
    var gnd = new THREE.Mesh(
      new THREE.PlaneGeometry(500,500),
      new THREE.MeshLambertMaterial({ map: gTex })
    );
    gnd.rotation.x=-Math.PI/2; gnd.position.set(25,-0.05,36);
    gnd.receiveShadow=true; scene.add(gnd);
  }

  // Road & curbs
  Engine.buildRoad(scene, tpts, C.trackWidth, Textures.asphalt());
  Engine.buildCurbs(scene, tpts, C.trackWidth, Textures.curb(C.trackSegs));

  // Finish line
  if (C.buildFinish) C.buildFinish(scene);

  // Item boxes
  var iboxes = Engine.buildItemBoxes(scene, C.controlPoints, C.itemBoxes);

  // Scenery
  var extras = C.buildScenery ? C.buildScenery(scene) : {};

  // Player kart
  var pKart = KartBuilder.make(0xff1a1a, 0x1122bb, 0x222222);
  scene.add(pKart);

  // Player controller
  var player = new Engine.PlayerController({
    startX:     C.startX,
    startZ:     C.startZ,
    startAngle: C.startAngle,
    laps:       C.laps || 3,
    gateX:      C.gateX,
    gatePredicate: C.gatePredicate || null
  });

  // CPU karts
  var cpuKarts = [], cpuCtrl = [];
  (C.cpus || []).forEach(function(cpu, i) {
    var colors = (C.cpuColors || [])[i] || [0xffcc00, 0x885500];
    var k = KartBuilder.make(colors[0], colors[1], 0x222222);
    scene.add(k);
    cpuKarts.push(k);
    var ctrl = new Engine.CpuController(C.controlPoints, cpu.startT, cpu.maxSpd);
    k.position.set(ctrl.px, 0, ctrl.pz);
    k.rotation.y = ctrl.angle;
    cpuCtrl.push(ctrl);
  });

  // Exhaust system
  var exhaust = new Engine.ExhaustSystem(scene);

  // Placed items (from player)
  var placed = [];

  // Input
  var keys = {};
  window.addEventListener('keydown', function(e) {
    keys[e.key]=true;
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.key)>=0) e.preventDefault();
  });
  window.addEventListener('keyup', function(e) { keys[e.key]=false; });

  // UI elements
  var lapD=document.getElementById('lapd'), posD=document.getElementById('posd');
  var itemD=document.getElementById('itemd'), spdD=document.getElementById('spdd');
  var msgEl=document.getElementById('msg');
  var mmCv=document.getElementById('mm'), mmx=mmCv.getContext('2d');
  var gstate='racing', frm=0;

  function showMsg(t,d){msgEl.innerHTML=t;msgEl.style.display='block';if(d)setTimeout(function(){msgEl.style.display='none';},d);}
  showMsg('GO! 🏁',1400);

  function racePos() {
    var all=[{lap:player.lap,t:Engine.nearestT(C.controlPoints,C.trackSegs,player.px,player.pz),pl:true}];
    cpuCtrl.forEach(function(c){all.push({lap:c.lap,t:Engine.nearestT(C.controlPoints,C.trackSegs,c.px,c.pz),pl:false});});
    all.sort(function(a,b){return b.lap!==a.lap?b.lap-a.lap:b.t-a.t;});
    var idx=all.findIndex(function(a){return a.pl;});
    return['1st','2nd','3rd','4th'][idx]||'4th';
  }

  // Init camera
  camera.position.set(
    player.px - Math.sin(player.angle)*13,
    7,
    player.pz - Math.cos(player.angle)*13
  );
  camera.lookAt(player.px+Math.sin(player.angle)*8, 1.5, player.pz+Math.cos(player.angle)*8);

  var lastT=0;
  function animate(now) {
    requestAnimationFrame(animate);
    var dt=Math.min((now-lastT)/1000,0.05); lastT=now; frm++;

    // Animate course scenery
    if (C.animateScenery) C.animateScenery(extras, frm);

    if (gstate==='racing') {
      // Player update
      var st = player.update(dt, keys, tpts);

      // Item use
      if (keys[' '] && player.item) {
        if (player.item==='star') {
          player.starT=4; showMsg('⭐ スター！',1200);
        } else {
          var ic=Engine.ICOLORS[player.item]||0xffee00;
          var im=new THREE.Mesh(new THREE.SphereGeometry(0.6,8,8),new THREE.MeshLambertMaterial({color:ic,emissive:ic,emissiveIntensity:0.4}));
          im.position.set(player.px-Math.sin(player.angle)*2.4,0.6,player.pz-Math.cos(player.angle)*2.4);
          scene.add(im); placed.push({mesh:im,type:player.item});
        }
        player.item=null; itemD.textContent='--';
      }

      // Exhaust
      if(frm%3===0&&st.spd>2) exhaust.spawn(player.px-Math.sin(player.angle)*2,player.pz-Math.cos(player.angle)*2,player.starT>0?0xff8800:0xaaaaaa);
      exhaust.update(dt);

      // Lap gate
      if (player.checkGate()) {
        player.lap++;
        if(player.lap>player.TLAPS){
          gstate='finish';
          showMsg('🏁 FINISH!<br><span style="font-size:24px">'+racePos()+'</span>',0);
        } else {
          showMsg('LAP '+player.lap+'! 🎯',1500);
        }
      }

      // HUD
      lapD.textContent=Math.min(player.lap,player.TLAPS)+' / '+player.TLAPS;
      posD.textContent=racePos();
      spdD.textContent=Math.round(st.spd/player.MAXSPD*120)+' km/h';

      // Kart mesh
      pKart.position.set(player.px,0,player.pz);
      if(st.spd>0.8) pKart.rotation.y=player.angle;
      pKart.rotation.z=((st.rt?1:0)-(st.lt?1:0))*-0.07*Math.min(st.spd/player.MAXSPD,1);

      // CPU
      cpuCtrl.forEach(function(c,i) {
        var prevCX=c.px; c.update(dt);
        if(player.checkGate && typeof c.px!=='undefined') {
          if(prevCX<player.gateX&&c.px>=player.gateX&&Math.abs(c.pz)<11) c.lap++;
        }
        cpuKarts[i].position.set(c.px,0,c.pz);
        if(Math.sqrt(c.vx*c.vx+c.vz*c.vz)>0.5) cpuKarts[i].rotation.y=c.angle;
      });

      // Item boxes
      iboxes.forEach(function(ib) {
        if(ib.col){ib.resp-=dt;if(ib.resp<=0){ib.col=false;ib.g.visible=true;ib.type=Engine.ITYPES[Math.floor(Math.random()*4)];} return;}
        ib.g.rotation.y+=0.04; ib.wf.rotation.y-=0.06;
        ib.g.position.y=1.0+Math.sin(frm*0.05)*0.2;
        var ip=ib.g.position,dx=player.px-ip.x,dz2=player.pz-ip.z;
        if(dx*dx+dz2*dz2<7){
          player.item=ib.type; itemD.textContent=Engine.IEMOJI[ib.type];
          ib.col=true; ib.resp=12; ib.g.visible=false;
          showMsg(Engine.IEMOJI[ib.type]+' GET!',900);
        }
      });

      // Placed items collision
      placed.forEach(function(pi) {
        if(!pi.mesh||!pi.mesh.parent)return;
        pi.mesh.rotation.y+=0.1;
        var dx=player.px-pi.mesh.position.x,dz2=player.pz-pi.mesh.position.z;
        if(dx*dx+dz2*dz2<3&&player.starT<=0){
          scene.remove(pi.mesh);pi.mesh=null;
          player.hit(); showMsg('💥 HIT!',1100);
        }
      });

      // Camera
      var tx=player.px-Math.sin(player.angle)*13, tz=player.pz-Math.cos(player.angle)*13;
      camera.position.x+=(tx-camera.position.x)*0.12;
      camera.position.y+=(7-camera.position.y)*0.08;
      camera.position.z+=(tz-camera.position.z)*0.12;
      camera.lookAt(player.px+Math.sin(player.angle)*8,1.5,player.pz+Math.cos(player.angle)*8);
    }

    // Minimap
    Engine.drawMinimap(mmx, C.controlPoints, C.trackSegs, player.px, player.pz, cpuCtrl);
    renderer.render(scene, camera);
  }
  animate(0);
}
</script>
</body>
</html>
